<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <link rel="shortcut icon" type="image/ico" href="/src/assets/favicon.ico" />
    <title>App</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }
      /* 预设暗色主题变量，避免首屏白底闪烁（button/input 等浏览器默认样式） */
      :root {
        --vscode-editor-background: #1E1E1E;
        --vscode-editor-foreground: #D4D4D4;
        --vscode-sideBar-background: #252526;
        --vscode-border: #3c3c3c;
        --vscode-button-background: #0e639c;
        --vscode-button-hoverBackground: #1177bb;
        --vscode-button-secondaryBackground: #3c3c3c;
        --vscode-button-secondaryHoverBackground: #505050;
        --vscode-input-background: #3c3c3c;
        --vscode-input-foreground: #D4D4D4;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background-color: #1e1e1e;
        color: #cccccc;
        font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      }
      input, button, select {
        background: var(--vscode-input-background);
        color: var(--vscode-input-foreground);
      }
      #root {
        height: 100%;
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/frontend/index.tsx"></script>
  </body>
</html>
