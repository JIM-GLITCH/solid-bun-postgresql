# 阿里云函数计算 - Serverless Devs 配置
# 部署前: 1. 构建镜像并推送到 ACR  2. 配置环境变量
# 文档: https://docs.serverless-devs.com/user-guide/aliyun/fc3/spec/

edition: 3.0.0
name: db-player-subscription
access: default

vars:
  region: cn-hangzhou

resources:
  db-player-api:
    component: fc3
    props:
      region: ${vars.region}
      functionName: db-player-subscription-api
      description: DB Player 订阅 API（登录、订阅校验）
      runtime: custom-container
      memorySize: 512
      cpu: 0.25
      diskSize: 512
      timeout: 60
      instanceConcurrency: 10

      # 自定义镜像（需先构建并推送到 ACR）
      customContainerConfig:
        image: registry.cn-hangzhou.aliyuncs.com/${env('ACR_NAMESPACE', 'your-namespace')}/db-player-subscription:latest
        port: 9000

      # 环境变量（建议用 .env 或密钥管理，勿提交敏感信息）
      environmentVariables:
        PORT: "9000"
        # DATABASE_URL: postgres://user:pass@host:5432/dbname
        # JWT_SECRET: your-secret
        # GITHUB_CLIENT_ID: xxx
        # GITHUB_CLIENT_SECRET: xxx
        # FRONTEND_URL: https://your-frontend.com
        # API_BASE_URL: https://xxx.cn-hangzhou.fcapp.run （FC HTTP 触发器地址，GitHub 回调用）

      # 访问 RDS 需配置 VPC
      # vpcConfig:
      #   vpcId: vpc-xxx
      #   vSwitchIds:
      #     - vsw-xxx
      #   securityGroupId: sg-xxx

      internetAccess: true
      logConfig: auto

      # HTTP 触发器（API 网关透传）
      triggers:
        - triggerName: httpTrigger
          triggerType: http
          triggerConfig:
            authType: anonymous
            methods:
              - GET
              - POST
              - OPTIONS
