<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes" />
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}" />
  <title>DB Player</title>
  <!-- Monaco Editor CSS - 在其他样式之前加载 -->
  <link rel="stylesheet" href="{{MONACO_BASE_URI}}/editor/editor.main.css" />
  <style>
    html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body {
      color: var(--vscode-editor-foreground, #1e1e1e);
      background: var(--vscode-editor-background, #ffffff);
      font-family: var(--vscode-font-family, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif);
      font-size: var(--vscode-font-size, 13px);
      -webkit-font-smoothing: antialiased;
    }
    #root { height: 100%; overflow: hidden; color: var(--vscode-editor-foreground, inherit); background: var(--vscode-editor-background, inherit); }
    a { color: var(--vscode-editorLink-foreground, #0066cc); text-decoration: none; }
    a:hover { text-decoration: underline; }
    input, button, select { color: var(--vscode-input-foreground, #1e1e1e); background: var(--vscode-input-background, #fff); }
    
    /* 修复 VSCode Webview 下 Monaco 内部输入层可见（白/黑条、光标错位） */
    /* 完全隐藏 Monaco 的输入层和输入法层 */
    textarea.inputarea,
    textarea.ime-text-area {
      position: absolute !important;
      top: -9999px !important;
      left: -9999px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
      background: transparent !important;
      color: transparent !important;
      border: none !important;
      outline: none !important;
      box-shadow: none !important;
      caret-color: transparent !important;
      resize: none !important;
      min-width: 0 !important;
      min-height: 0 !important;
      padding: 0 !important;
      margin: 0 !important;
      pointer-events: none !important;
      z-index: -9999 !important;
    }

    /* 修复 Monaco 在 VSCode Webview 中的布局问题 */
    .monaco-editor {
      position: relative !important;
    }
    
    /* 隐藏 Monaco 的其他可能的文本输入元素 */
    .monaco-editor input[type="text"],
    .monaco-editor input[type="search"] {
      position: absolute !important;
      top: -9999px !important;
      left: -9999px !important;
      width: 1px !important;
      height: 1px !important;
      opacity: 0 !important;
    }

    /* 确保编辑器框架正确 */
    .monaco-editor-background {
      position: absolute !important;
    }

    /* 修复光标位置 */
    .monaco-editor .cursors-layer {
      z-index: 1 !important;
    }

    /* 完全隐藏输入法编辑器背景 */
    .monaco-editor .inputarea,
    .monaco-editor .ime-text-area {
      position: absolute !important;
      top: -9999px !important;
      left: -9999px !important;
    }

    .err { padding: 1em; color: #c00; font-family: sans-serif; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    window.__MONACO_BASE__ = "{{MONACO_BASE_URI}}";
  </script>
  <!-- Ensure a global `monaco` binding exists to avoid ReferenceError from chunks
       that reference the identifier before the editor initializes. -->
  <script>var monaco;</script>
  <!-- Theme sync: listen for theme messages from extension and apply -->
  <script>
    (function(){
      // apply theme kind as attribute for CSS usage
      function applyTheme(themeKind, monacoTheme) {
        try {
          document.documentElement.setAttribute('data-vscode-theme', themeKind);
          var __mc = window.monaco;
          if (__mc && __mc.editor && __mc.editor.setTheme) {
            __mc.editor.setTheme(monacoTheme);
          }
        } catch (e) {
          // ignore
        }
      }

      // Receive messages from extension
      window.addEventListener('message', (e) => {
        const msg = e.data;
        if (!msg) return;
        if (msg.type === 'theme') {
          applyTheme(msg.themeKind, msg.monacoTheme);
        }
      });

      // Note: the extension will post the initial theme after HTML is set. Do not call acquireVsCodeApi()
      // here to avoid acquiring the VS Code API multiple times which can throw.
    })();
  </script>
  <script type="module" src="{{SCRIPT_URI}}"></script>
</body>
</html>
